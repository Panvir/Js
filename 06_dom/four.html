<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom</title>
</head>
<body style="background-color: black;color: aliceblue;">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    function addLanguage(langName){
        const li=document.createElement('li')
        li.innerHTML=`${langName}`

        document.querySelector('.language').appendChild(li)
    }
    addLanguage("python")
    addLanguage("typescirpt")
//crate text node nl optimise rehnda a tree traverse nhi krda pura 
    function addOptiLanguage(LangName)
    {
        const li=document.createElement('li');
        li.appendChild(document.createTextNode(LangName))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLanguage("ruby")

    //Edit
    const secondlang=document.querySelector("li:nth-child(2)")
    // secondlang.innerHTML="moji"
    const newli=document.createElement('li')
    // newli.appendChild(document.createTextNode("MOJO"))
    newli.textContent="MOJo"
    secondlang.replaceWith(newli)

    //edit
    const firstLang=document.querySelector('li:first-child')
    firstLang.outerHTML='<li>Typescipt</li>'

    //remove
    const lastlanguage=document.querySelector('li:last-child')
    lastlanguage.remove()
</script>
</html>
